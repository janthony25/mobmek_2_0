services:
  db:
    image: postgres:17
    container_name: mobmek_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mobmek
      POSTGRES_USER: postgres
      # Set via .env (gitignored, copy from .env.example) — do not commit a real password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      # Host 5433 (not 5432) avoids the machine's EDB PostgreSQL 18 install that owns 5432.
      # Container still listens on 5432; host tooling (`dotnet run`, `dotnet ef`) uses localhost:5433.
      - "5433:5432"
    volumes:
      - mobmek_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mobmek"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./mobmek_api
      dockerfile: Dockerfile
    container_name: mobmek_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Development auto-migrates on startup and exposes Swagger — override in .env for
      # a real deployment (see .env.example) and run migrations as a separate step there.
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_HTTP_PORTS: "8080"
      # Inside the compose network the DB host is the service name "db", not localhost.
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=mobmek;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      # First-run admin bootstrap (docs/auth-module-design.md) — set real values via .env.
      Bootstrap__AdminEmail: ${BOOTSTRAP_ADMIN_EMAIL:-justforvalo25@gmail.com}
      Bootstrap__AdminPassword: ${BOOTSTRAP_ADMIN_PASSWORD:-DevAdmin!2026}
      # Auth cookies are signed/encrypted with Data Protection keys; persist them to a
      # volume so a container restart doesn't invalidate every signed-in session.
      DataProtection__KeyPath: /keys
    volumes:
      - mobmek_dataprotection_keys:/keys
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./mobmek_frontend
      dockerfile: Dockerfile
    container_name: mobmek_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # nginx serves the built SPA on port 80 and proxies "/api" to the api service.
      - "3000:80"

volumes:
  mobmek_pgdata:
  mobmek_dataprotection_keys:
