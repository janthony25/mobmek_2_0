services:
  db:
    image: postgres:17
    container_name: mobmek_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mobmek
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host 5433 (not 5432) avoids the machine's EDB PostgreSQL 18 install that owns 5432.
      # Container still listens on 5432; host tooling (`dotnet run`, `dotnet ef`) uses localhost:5433.
      - "5433:5432"
    volumes:
      - mobmek_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mobmek"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./mobmek_api
      dockerfile: Dockerfile
    container_name: mobmek_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      # Inside the compose network the DB host is the service name "db", not localhost.
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=mobmek;Username=postgres;Password=postgres"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./mobmek_frontend
      dockerfile: Dockerfile
    container_name: mobmek_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # nginx serves the built SPA on port 80 and proxies "/api" to the api service.
      - "3000:80"

volumes:
  mobmek_pgdata:
